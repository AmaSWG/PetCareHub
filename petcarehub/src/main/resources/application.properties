spring.application.name=petcarehub
spring.profiles.active=dev

# MySQL DataSource Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:petcarehub}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization (disabled - no auto seed data)
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=false
jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2024

server.port=${PORT:8083}
#server.servlet.context-path=/api

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${ADMIN_EMAIL}
spring.mail.password=${ADMIN_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend reset URL (change for prod)
#app.reset.url=http://localhost:5173/reset?token=

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Springdoc OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT configuration
app.jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2024
app.jwt.expiration=86400000

stripe.secret.key=${STRIPE_SECRET_KEY}

app.cors.allowed-origins=${ALLOWED_ORIGINS}